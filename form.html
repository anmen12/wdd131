<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Product Review Form</title>
    <meta name="description" content="WDD 131 course, product review form assignment, create a form with a counter">
    <meta name="author" content="Bryson Gowans">
    <script src="scripts/form.js" defer></script>
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <label class="padding" for="products">Product Name<span class="required">*</span></label>
                <select id="products" name="product" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>

                <div class="padding">Overall Rating<span class="required">*</span></div>
                <div class="overall-rating">
                    <label for="1star">&#9734;</label>
                    <label for="2star">&#9734;&#9734;</label>
                    <label for="3star">&#9734;&#9734;&#9734;</label>
                    <label for="4star">&#9734;&#9734;&#9734;&#9734;</label>
                    <label for="5star">&#9734;&#9734;&#9734;&#9734;&#9734;</label>
                    <input type="radio" id="1star" name="rating" value="1" required>
                    <input type="radio" id="2star" name="rating" value="2" required>
                    <input type="radio" id="3star" name="rating" value="3" required>
                    <input type="radio" id="4star" name="rating" value="4" required>
                    <input type="radio" id="5star" name="rating" value="5" required>
                </div>

                <label class="padding" for="date">Date of Installation<span class="required">*</span></label>
                <input type="date" id="date" name="date" required>

                <div class="padding">Which features did you find useful in the product?</div>
                <div class="italic">(Check all that apply)</div>
                <div class="checkbox">
                    <input type="checkbox" id="durability" name="durability" value="yes">
                    <label for="durability"> Durability</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="ease-of-use" name="ease-of-use" value="yes">
                    <label for="ease-of-use"> Ease of Use</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="performance" name="performance" value="yes">
                    <label for="performance"> Performance</label>
                </div>
                <div class="checkbox">
                    <input type="checkbox" id="design" name="design" value="yes">
                    <label for="design"> Design</label>
                </div>

                <label class="padding">Written Review<span class="optional"> (Optional)</span></label>
                <textarea id="review" name="review"></textarea>

                <label class="padding">Your Name<span class="optional"> (Optional)</span></label>
                <input type="text" id="name" name="name">

                <input type="submit" value="Post Review">
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> | Bryson Gowans | Utah, USA</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
