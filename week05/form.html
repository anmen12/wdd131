<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Product Review Form</title>
    <meta name="description" content="WDD 131 course, product review form assignment, create a form with a counter">
    <meta name="author" content="Bryson Gowans">
    <script src="scripts/form.js" defer></script>
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <label class="padding">Product Name<span class="required">*</span>
                    <select id="products" name="product" required>
                        <option value="" disabled selected>Select a Product ...</option>
                    </select>
                </label>

                <div class="padding">Overall Rating<span class="required">*</span></div>
                <div class="rating">
                    <label>&#9734;<input type="radio" id="rating" name="rating" value="1" required></label>
                    <label>&#9734;&#9734;<input type="radio" id="rating" name="rating" value="2" required></label>
                    <label>&#9734;&#9734;&#9734;<input type="radio" id="rating" name="rating" value="3" required></label>
                    <label>&#9734;&#9734;&#9734;&#9734;<input type="radio" id="rating" name="rating" value="4" required></label>
                    <label>&#9734;&#9734;&#9734;&#9734;&#9734;<input type="radio" id="rating" name="rating" value="5" required></label>
                </div>

                <label class="padding">Date of Installation<span class="required">*</span><input type="date" id="date" name="date" required></label>

                <div class="padding">Which features did you find useful in the product?</div>
                <div class="italic">(Check all that apply)</div>
                <label class="checkbox"><input type="checkbox" id="features" name="durability" value="yes"> Durability</label>
                <label class="checkbox"><input type="checkbox" id="features" name="ease-of-use" value="yes"> Ease of Use</label>
                <label class="checkbox"><input type="checkbox" id="features" name="performance" value="yes"> Performance</label>
                <label class="checkbox"><input type="checkbox" id="features" name="design" value="yes"> Design</label>

                <label class="padding">Written Review <span class="optional">(Optional)</span><textarea id="review" name="review"></textarea></label>

                <label class="padding">Your Name <span class="optional">(Optional)</span><input type="text" id="name" name="name"></label>

                <input type="submit" value="Post Review">
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentyear"></span> | Bryson Gowans | Utah, USA</p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
